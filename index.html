<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Image Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <h1>Image Gallery</h1>
        <p class="subtitle">A fast, responsive, and modern collection</p>
      </header>

      <main class="gallery-container">
        <!-- Search and Filter (Optional future enhancement) -->
        <div class="controls">
          <input type="text" id="searchInput" placeholder="Search images..." aria-label="Search images" />
          <span class="count" id="imageCount">Loading...</span>
        </div>

        <div id="gallery-grid" class="gallery-grid">
          <!-- Images will be injected here by main.js -->
        </div>
      </main>

      <footer class="footer">
        <p>&copy; 2026 Modern Image Gallery</p>
      </footer>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
